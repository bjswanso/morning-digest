name: Morning Digest

on:
  schedule:
    - cron: "30 14 * * *"   # 14:30 UTC = 7:30 AM Arizona (no DST)
  workflow_dispatch:         # lets you run it by hand

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python digest.py

      - name: Publish
        run: |
          git config user.name "digest-bot"
          git config user.email "digest-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Digest $(date -u +%Y-%m-%d)" || exit 0
          git push
